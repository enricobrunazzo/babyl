# Deploy su Synology (Container Manager → Progetto) o qualsiasi host Docker.
# L'immagine è pubblicata da GitHub Actions a ogni push su main; watchtower
# la rileva e aggiorna il container automaticamente (niente passi manuali).
# Il reverse proxy punta a http://<NAS>:8787 (HTTP + WebSocket su /ws).
services:
  babyl:
    image: ghcr.io/enricobrunazzo/babyl:latest
    # Per buildare sul NAS invece di usare l'immagine pubblicata,
    # commenta la riga image e decommenta build:
    # build: .
    container_name: babyl
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      # Traduzione simultanea (OpenAI Realtime). Senza key l'app funziona
      # in modalità "voce originale" (nessuna traduzione).
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Opzionali:
      # - OPENAI_REALTIME_MODEL=gpt-realtime-2.1-mini
      # - OPENAI_REALTIME_VOICE=marin
      # - OPENAI_VAD_THRESHOLD=0.7   # più alto in sale rumorose (meno ripetizioni nelle pause)
      # - TRANSLATION_TIMING=release   # traduzione al rilascio invece che simultanea
      # Eventi programmati (API + persistenza SQLite). Senza token l'API è spenta
      # e il server resta identico. Il file DB va su volume per sopravvivere agli
      # aggiornamenti immagine (vedi volumes qui sotto).
      - BABYL_ADMIN_TOKEN=${BABYL_ADMIN_TOKEN:-}
      - BABYL_DB_PATH=/data/babyl.db
    volumes:
      - babyl-data:/data
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Aggiornamento automatico: controlla GHCR ogni 5 minuti e ricrea i soli
  # container con l'etichetta watchtower.enable (qui: babyl).
  watchtower:
    image: containrrr/watchtower:latest
    container_name: babyl-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300

# Persistenza degli eventi programmati (file SQLite): resta fuori dal layer
# immagine, così sopravvive ad aggiornamenti e ricreazioni del container.
volumes:
  babyl-data:
